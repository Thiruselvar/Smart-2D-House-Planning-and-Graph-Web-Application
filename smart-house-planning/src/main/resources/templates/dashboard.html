<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>
<main class="main-with-sidebar">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Dashboard</h2>
            <p class="text-secondary mb-0">Welcome, <span th:text="${username}"></span></p>
        </div>
        <a th:href="@{/plans/new}" class="btn btn-accent"><i class="bi bi-plus-lg"></i> New House Plan</a>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="text-secondary small">Saved Plans</div>
                <div class="value" th:text="${#lists.size(plans)}">0</div>
            </div>
        </div>
    </div>
    <div class="plan-panel">
        <h5 class="mb-3"><i class="bi bi-folder2-open"></i> Your House Plans</h5>
        <div th:if="${#lists.isEmpty(plans)}" class="text-secondary py-4 text-center">
            No plans yet. <a th:href="@{/plans/new}">Create your first plan</a>.
        </div>
        <table th:if="${!#lists.isEmpty(plans)}" class="table table-blueprint table-hover">
            <thead>
            <tr>
                <th>Name</th>
                <th>Plot</th>
                <th>Rooms</th>
                <th>Built-up</th>
                <th>Updated</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="plan : ${plans}">
                <td th:text="${plan.planName}">Plan</td>
                <td th:text="${plan.plotWidth + '×' + plan.plotHeight + ' m'}"></td>
                <td th:text="${plan.bedrooms + ' bed, ' + plan.bathrooms + ' bath'}"></td>
                <td th:text="${plan.totalBuiltUpArea != null ? plan.totalBuiltUpArea + ' sq.m' : '-'}"></td>
                <td th:text="${#temporals.format(plan.updatedAt, 'dd MMM yyyy')}"></td>
                <td>
                    <a th:href="@{/plans/{id}(id=${plan.planId})}" class="btn btn-sm btn-outline-info">Edit</a>
                    <a th:href="@{/plans/{id}/export/pdf(id=${plan.planId})}" class="btn btn-sm btn-outline-warning">PDF</a>
                    <form th:action="@{/plans/{id}/delete(id=${plan.planId})}" method="post" class="d-inline"
                          onsubmit="return confirm('Delete this plan?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
