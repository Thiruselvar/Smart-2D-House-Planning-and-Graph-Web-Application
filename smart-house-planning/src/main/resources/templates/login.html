<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="blueprint-bg d-flex align-items-center justify-content-center min-vh-100">
<div class="container" style="max-width: 420px;">
    <div class="text-center mb-4">
        <h1 class="text-warning"><i class="bi bi-building"></i> SmartPlan 2D</h1>
        <p class="text-secondary">Civil Engineering House Planning</p>
    </div>
    <div class="auth-card p-4">
        <h4 class="mb-3">Login</h4>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus/>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-engineering w-100 mb-2">Sign In</button>
        </form>
        <div class="text-center mt-3 small">
            <a th:href="@{/forgot-password}" class="text-info">Forgot password?</a> |
            <a th:href="@{/register}" class="text-info">Register</a>
        </div>
        <p class="text-muted small mt-3 mb-0">Demo admin: admin / admin123</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
