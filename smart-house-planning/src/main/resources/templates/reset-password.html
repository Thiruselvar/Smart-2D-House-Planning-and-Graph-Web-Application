<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>
<body class="blueprint-bg d-flex align-items-center justify-content-center min-vh-100">
<div class="container" style="max-width: 420px;">
    <div class="auth-card p-4">
        <h4 class="mb-3">Reset Password</h4>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/reset-password/{token}(token=${token})}" method="post">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-control" required minlength="6"/>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirmPassword" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-accent w-100">Update Password</button>
        </form>
    </div>
</div>
</body>
</html>
