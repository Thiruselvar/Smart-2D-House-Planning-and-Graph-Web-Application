<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Smart House Planning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="blueprint-bg">
<nav th:fragment="navbar" class="navbar navbar-dark navbar-engineering px-3">
    <a class="navbar-brand" th:href="@{/dashboard}">
        <i class="bi bi-building"></i> SmartPlan 2D
    </a>
    <div class="d-flex align-items-center gap-3 text-light">
        <span sec:authorize="isAuthenticated()" sec:authentication="name" class="small"></span>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="btn btn-sm btn-outline-light">Admin</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-sm btn-outline-warning">Logout</button>
        </form>
    </div>
</nav>
<aside th:fragment="sidebar(active)" class="sidebar">
    <ul class="nav flex-column">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'dashboard'} ? 'active'" th:href="@{/dashboard}">
                <i class="bi bi-grid-1x2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'new'} ? 'active'" th:href="@{/plans/new}">
                <i class="bi bi-plus-square"></i> New Plan
            </a>
        </li>
    </ul>
</aside>
<script th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</script>
</body>
</html>
