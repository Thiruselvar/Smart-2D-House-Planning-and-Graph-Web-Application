<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body class="blueprint-bg d-flex align-items-center justify-content-center min-vh-100">
<div class="container" style="max-width: 420px;">
    <div class="auth-card p-4">
        <h4 class="mb-3">Forgot Password</h4>
        <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-engineering w-100">Send Reset Link</button>
        </form>
        <p class="text-center mt-3 small"><a th:href="@{/login}" class="text-info">Back to login</a></p>
    </div>
</div>
</body>
</html>
